name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services changed
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      arena: ${{ steps.filter.outputs.arena }}
      l2p: ${{ steps.filter.outputs.l2p }}
      auth: ${{ steps.filter.outputs.auth }}
      shop: ${{ steps.filter.outputs.shop }}
      videovault: ${{ steps.filter.outputs.videovault }}
      sos: ${{ steps.filter.outputs.sos }}
      assetgenerator: ${{ steps.filter.outputs.assetgenerator }}
      k8s: ${{ steps.filter.outputs.k8s }}
      any-service: ${{ steps.filter.outputs.arena == 'true' || steps.filter.outputs.l2p == 'true' || steps.filter.outputs.auth == 'true' || steps.filter.outputs.shop == 'true' || steps.filter.outputs.videovault == 'true' || steps.filter.outputs.sos == 'true' || steps.filter.outputs.assetgenerator == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            arena:
              - 'arena/**'
            l2p:
              - 'l2p/**'
            auth:
              - 'auth/**'
            shop:
              - 'shop/**'
            videovault:
              - 'VideoVault/**'
            sos:
              - 'SOS/**'
            assetgenerator:
              - 'Assetgenerator/**'
            k8s:
              - 'k8s/**'

  # ---------------------------------------------------------------------------
  # L2P: Typecheck + Unit Tests
  # ---------------------------------------------------------------------------
  l2p:
    needs: changes
    if: needs.changes.outputs.l2p == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l2p
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (frontend)
        run: npm run test:unit:frontend

      - name: Unit tests (backend)
        run: npm run test:unit:backend

  # ---------------------------------------------------------------------------
  # Auth: Typecheck + Unit Tests
  # ---------------------------------------------------------------------------
  auth:
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Shop: Unit Tests
  # ---------------------------------------------------------------------------
  shop:
    needs: changes
    if: needs.changes.outputs.shop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx vitest run test/unit/

  # ---------------------------------------------------------------------------
  # VideoVault: Typecheck + Unit Tests + Build
  # ---------------------------------------------------------------------------
  videovault:
    needs: changes
    if: needs.changes.outputs.videovault == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VideoVault
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm run test:2:unit

      - name: Build validation
        run: npm run build

  # ---------------------------------------------------------------------------
  # SOS: Typecheck + Unit Tests
  # ---------------------------------------------------------------------------
  sos:
    needs: changes
    if: needs.changes.outputs.sos == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SOS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Assetgenerator: Unit Tests
  # ---------------------------------------------------------------------------
  assetgenerator:
    needs: changes
    if: needs.changes.outputs.assetgenerator == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Assetgenerator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx vitest run test/worker-manager.test.js test/adapter-routing.test.js

  # ---------------------------------------------------------------------------
  # Arena: Unit Tests (backend + frontend)
  # ---------------------------------------------------------------------------
  arena:
    needs: changes
    if: needs.changes.outputs.arena == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arena
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (backend)
        run: npm --prefix backend run test:unit

  # ---------------------------------------------------------------------------
  # Docker Build Validation (master only)
  # ---------------------------------------------------------------------------
  docker-validate:
    needs: changes
    if: github.ref == 'refs/heads/master' && needs.changes.outputs.any-service == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: l2p-backend
            dockerfile: l2p/backend/Dockerfile
            changed: ${{ needs.changes.outputs.l2p }}
          - service: l2p-frontend
            dockerfile: l2p/frontend/Dockerfile
            changed: ${{ needs.changes.outputs.l2p }}
          - service: auth
            dockerfile: auth/Dockerfile
            changed: ${{ needs.changes.outputs.auth }}
          - service: shop
            dockerfile: shop/Dockerfile
            changed: ${{ needs.changes.outputs.shop }}
          - service: videovault
            dockerfile: VideoVault/Dockerfile.prod
            changed: ${{ needs.changes.outputs.videovault }}
          - service: sos
            dockerfile: SOS/Dockerfile
            changed: ${{ needs.changes.outputs.sos }}
          - service: arena-backend
            dockerfile: arena/backend/Dockerfile
            changed: ${{ needs.changes.outputs.arena }}
          - service: arena-frontend
            dockerfile: arena/frontend/Dockerfile
            changed: ${{ needs.changes.outputs.arena }}
          - service: assetgenerator
            dockerfile: Assetgenerator/Dockerfile
            changed: ${{ needs.changes.outputs.assetgenerator }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Kubernetes Manifest Validation
  # Note: vault excluded — references unseal-secret.yaml which is gitignored
  # ---------------------------------------------------------------------------
  k8s-validate:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate service manifests
        run: |
          for dir in k8s/services/*/; do
            echo "--- Validating $dir ---"
            kustomize build "$dir"
          done

      - name: Validate infrastructure manifests
        run: |
          for dir in k8s/infrastructure/*/; do
            # Skip vault — unseal-secret.yaml is a generated secret (gitignored)
            if [ "$(basename "$dir")" = "vault" ]; then
              echo "--- Skipping $dir (has gitignored resources) ---"
              continue
            fi
            echo "--- Validating $dir ---"
            kustomize build "$dir"
          done

      - name: Validate development overlay
        run: kustomize build k8s/overlays/development

  # ---------------------------------------------------------------------------
  # Commitlint (Conventional Commits enforcement)
  # ---------------------------------------------------------------------------
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ---------------------------------------------------------------------------
  # GitLeaks (secret scanning)
  # ---------------------------------------------------------------------------
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Semgrep (SAST)
  # ---------------------------------------------------------------------------
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST scan
        run: semgrep scan --config auto --error --json-output=semgrep-results.json || true

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Trivy (dependency vulnerability scanning)
  # ---------------------------------------------------------------------------
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ---------------------------------------------------------------------------
  # CI Status (single green/red badge for the entire pipeline)
  # ---------------------------------------------------------------------------
  ci-status:
    if: always()
    needs: [l2p, auth, shop, videovault, sos, assetgenerator, arena, docker-validate, k8s-validate, commitlint, secrets-scan, semgrep, trivy]
    runs-on: ubuntu-latest
    steps:
      - name: Check pipeline status
        env:
          L2P_RESULT: ${{ needs.l2p.result }}
          AUTH_RESULT: ${{ needs.auth.result }}
          SHOP_RESULT: ${{ needs.shop.result }}
          VV_RESULT: ${{ needs.videovault.result }}
          SOS_RESULT: ${{ needs.sos.result }}
          ASSETGEN_RESULT: ${{ needs.assetgenerator.result }}
          ARENA_RESULT: ${{ needs.arena.result }}
          DOCKER_RESULT: ${{ needs.docker-validate.result }}
          K8S_RESULT: ${{ needs.k8s-validate.result }}
          COMMITLINT_RESULT: ${{ needs.commitlint.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
        run: |
          echo "Pipeline results:"
          echo "  l2p:               $L2P_RESULT"
          echo "  auth:              $AUTH_RESULT"
          echo "  shop:              $SHOP_RESULT"
          echo "  videovault:        $VV_RESULT"
          echo "  sos:               $SOS_RESULT"
          echo "  assetgenerator:    $ASSETGEN_RESULT"
          echo "  arena:             $ARENA_RESULT"
          echo "  docker-validate:   $DOCKER_RESULT"
          echo "  k8s-validate:      $K8S_RESULT"
          echo "  commitlint:        $COMMITLINT_RESULT"
          echo "  secrets-scan:      $SECRETS_RESULT"
          echo "  semgrep:           $SEMGREP_RESULT"
          echo "  trivy:             $TRIVY_RESULT"

          # Fail if any required job failed (skipped is OK — means no changes for that service)
          for result in "$L2P_RESULT" "$AUTH_RESULT" "$SHOP_RESULT" "$VV_RESULT" "$SOS_RESULT" "$ASSETGEN_RESULT" "$ARENA_RESULT" "$DOCKER_RESULT" "$K8S_RESULT" "$COMMITLINT_RESULT" "$SECRETS_RESULT" "$SEMGREP_RESULT" "$TRIVY_RESULT"; do
            if [[ "$result" == "failure" ]]; then
              echo "::error::One or more CI jobs failed"
              exit 1
            fi
          done
          echo "All CI checks passed (or were skipped)."
