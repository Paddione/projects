<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assetgenerator — Asset Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #08080f;
      --bg-surface: #0e0e1a;
      --bg-card: #131320;
      --bg-card-hover: #181830;
      --border: #1e1e3a;
      --border-focus: #2a2a5a;
      --cyan: #00e5ff;
      --cyan-dim: #00e5ff44;
      --cyan-glow: #00e5ff22;
      --orange: #ff6b35;
      --orange-dim: #ff6b3544;
      --green: #00ff88;
      --red: #ff3366;
      --text: #e0e0f0;
      --text-dim: #8888aa;
      --text-muted: #555570;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: 'Instrument Sans', system-ui, sans-serif;
      --radius: 6px;
    }

    html { font-size: 14px; }
    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Subtle noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* Header */
    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .logo {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--cyan);
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--text-dim);
      font-weight: 400;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    select, input, textarea {
      background: var(--bg-deep);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px var(--cyan-glow);
    }

    select { cursor: pointer; padding-right: 1.5rem; }

    button {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    button:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-focus);
    }

    button:active { transform: scale(0.97); }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--cyan-dim);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn-primary:hover {
      background: var(--cyan);
      color: var(--bg-deep);
    }

    .btn-danger {
      background: var(--orange-dim);
      border-color: var(--orange);
      color: var(--orange);
    }

    .btn-danger:hover {
      background: var(--orange);
      color: var(--bg-deep);
    }

    /* Warning bar */
    .warning-bar {
      background: #332200;
      border-bottom: 1px solid #664400;
      color: #ffaa44;
      padding: 0.5rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .warning-bar::before { content: '⚠'; }

    /* Filters */
    .filter-bar {
      display: flex;
      gap: 0.25rem;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .filter-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-dim);
      padding: 0.3rem 0.75rem;
      font-size: 0.78rem;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .filter-btn:hover { color: var(--text); }

    .filter-btn.active {
      color: var(--cyan);
      border-color: var(--cyan-dim);
      background: var(--cyan-glow);
    }

    .section-header {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .empty-state {
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 3rem;
      text-align: center;
    }

    /* Sound card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--border-focus);
    }

    .card.flagged {
      border-color: var(--orange);
      box-shadow: inset 0 0 0 1px var(--orange-dim), 0 0 20px var(--orange-dim);
    }

    .card.save-flash {
      border-color: var(--green) !important;
      box-shadow: 0 0 12px #00ff8833 !important;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .sound-name {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-type {
      background: var(--cyan-glow);
      color: var(--cyan);
      border: 1px solid var(--cyan-dim);
    }

    .badge-loop {
      background: #22004422;
      color: #aa88ff;
      border: 1px solid #aa88ff44;
    }

    .badge-flagged {
      background: var(--orange-dim);
      color: var(--orange);
      border: 1px solid var(--orange);
      animation: pulse-flag 2s infinite;
    }

    @keyframes pulse-flag {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .file-info {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Waveform */
    .waveform-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      padding: 0;
      flex-shrink: 0;
      border-color: var(--cyan-dim);
      color: var(--cyan);
      line-height: 1;
    }

    .play-btn:hover {
      background: var(--cyan);
      color: var(--bg-deep);
    }

    .play-btn.playing {
      background: var(--cyan);
      color: var(--bg-deep);
      animation: glow-pulse 1s infinite alternate;
    }

    @keyframes glow-pulse {
      from { box-shadow: 0 0 8px var(--cyan-dim); }
      to { box-shadow: 0 0 16px var(--cyan); }
    }

    canvas.waveform {
      flex: 1;
      height: 48px;
      border-radius: 4px;
      cursor: pointer;
      image-rendering: pixelated;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .controls label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .controls textarea {
      width: 100%;
      resize: vertical;
      min-height: 2.5rem;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .controls-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .controls-row label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .controls-row input {
      width: 100px;
    }

    .controls-row select {
      min-width: 180px;
    }

    /* Card actions */
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    /* Status bar */
    .status-bar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
    }

    .status-bar.active {
      max-height: 80px;
      opacity: 1;
      padding: 0.5rem 1.5rem;
    }

    .status-bar-inner {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      flex-shrink: 0;
      animation: status-pulse 1.5s ease-in-out infinite;
    }

    .status-indicator.done { background: var(--green); animation: none; }
    .status-indicator.error { background: var(--red); animation: none; }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--cyan); }
      50% { opacity: 0.4; box-shadow: none; }
    }

    .status-text {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .status-text span { color: var(--text-dim); }

    .status-progress-wrap {
      flex: 0 0 160px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .status-progress-fill {
      height: 100%;
      background: var(--cyan);
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .status-progress-fill.done { background: var(--green); }
    .status-progress-fill.error { background: var(--red); }

    .status-progress-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 3rem;
      text-align: right;
    }

    .status-elapsed {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Log panel */
    .log-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      z-index: 100;
      transition: transform 0.25s;
    }

    .log-panel.collapsed .log-content { display: none; }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      user-select: none;
    }

    .log-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .log-count {
      background: var(--border);
      color: var(--text-dim);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.65rem;
    }

    .log-count.has-errors { background: var(--red); color: #fff; }

    .log-content {
      max-height: 250px;
      overflow-y: auto;
      padding: 0 1.5rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.6;
    }

    .log-content div { padding: 0.1rem 0; }
    .log-content .error { color: var(--red); }
    .log-content .warn { color: var(--orange); }
    .log-content .success { color: var(--green); }
    .log-content .dim { color: var(--text-dim); }
    .log-content .phase-label { color: var(--cyan); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-focus); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Tab toggle */
    .tab-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-radius: 0;
      color: var(--text-dim);
      padding: 0.35rem 0.8rem;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      background: var(--cyan-dim);
      color: var(--cyan);
    }

    /* Pipeline indicator */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin: 0.5rem 0;
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .pipeline-phase {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    .pipeline-phase.done { border-color: var(--green); color: var(--green); }
    .pipeline-phase.pending { border-color: var(--text-muted); color: var(--text-muted); }
    .pipeline-phase.generating { border-color: var(--cyan); color: var(--cyan); animation: pulse-flag 1.5s infinite; }
    .pipeline-phase.error { border-color: var(--red); color: var(--red); }

    .pipeline-arrow { color: var(--text-muted); font-size: 0.65rem; }

    /* Assignment info */
    .assign-info {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      margin: 0.3rem 0;
    }

    /* Visual preview */
    .preview-row {
      display: flex;
      gap: 0.75rem;
      margin: 0.5rem 0;
      overflow-x: auto;
    }

    .preview-thumb {
      width: 80px;
      height: 80px;
      border-radius: 4px;
      border: 1px solid var(--border);
      object-fit: contain;
      background: var(--bg-deep);
    }

    /* Audio slot row */
    .slot-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.35rem;
      transition: border-color 0.2s;
    }

    .slot-row:hover { border-color: var(--border-focus); }

    .slot-row.save-flash {
      border-color: var(--green) !important;
      box-shadow: 0 0 12px #00ff8833 !important;
    }

    .slot-name {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text);
      min-width: 160px;
    }

    .slot-select {
      flex: 1;
      min-width: 200px;
    }

    .slot-play {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      padding: 0;
      flex-shrink: 0;
      border-color: var(--cyan-dim);
      color: var(--cyan);
      line-height: 1;
    }

    .slot-play:hover { background: var(--cyan); color: var(--bg-deep); }

    .slot-status {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      min-width: 80px;
      text-align: right;
    }

    .slot-status.synced { color: var(--green); }
    .slot-status.unsynced { color: var(--orange); }

    .add-slot-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 0;
      align-items: center;
    }

    .add-slot-row input {
      flex: 1;
      max-width: 250px;
    }

    /* Library assignment badges in global view */
    .assignment-badges {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .badge-project {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      background: #1a1a3a;
      color: var(--cyan);
      border: 1px solid var(--cyan-dim);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo">Asset<span>generator</span></div>
      <div class="tab-toggle">
        <button class="tab-btn active" data-tab="audio">Audio</button>
        <button class="tab-btn" data-tab="visual">Visual</button>
      </div>
      <label style="display:flex;align-items:center;gap:0.4rem;">
        <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Project</span>
        <select id="project-select"></select>
      </label>
    </div>
    <div class="header-controls">
      <button id="scan-btn">Scan</button>
      <button id="sync-btn">Sync</button>
      <button id="regen-btn" class="btn-primary">Regenerate Flagged</button>
    </div>
  </header>

  <div id="status-bar" class="status-bar">
    <div class="status-bar-inner">
      <div id="status-indicator" class="status-indicator"></div>
      <div id="status-text" class="status-text"></div>
      <div class="status-progress-wrap">
        <div class="status-progress-track">
          <div id="status-progress-fill" class="status-progress-fill"></div>
        </div>
        <div id="status-progress-label" class="status-progress-label"></div>
      </div>
      <div id="status-elapsed" class="status-elapsed"></div>
    </div>
  </div>

  <div id="prereq-warning" hidden></div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="sfx">SFX</button>
    <button class="filter-btn" data-filter="music">Music</button>
    <button class="filter-btn" data-filter="flagged">Flagged</button>
  </div>

  <div id="audio-container" style="padding:1rem 1.5rem 6rem;max-width:1100px;margin:0 auto;"></div>
  <div id="visual-container" style="padding:1rem 1.5rem 6rem;max-width:1100px;margin:0 auto;display:none;"></div>

  <div id="regen-log" class="log-panel collapsed" hidden>
    <div class="log-header" id="log-toggle">
      <div class="log-header-left">
        <span>Pipeline Log</span>
        <span id="log-count" class="log-count">0</span>
      </div>
      <span id="log-toggle-icon">▲</span>
    </div>
    <div class="log-content" id="log-content"></div>
  </div>

<script>
// =============================================================================
// State
// =============================================================================

let currentProject = null;
let projectData = null;
let backends = {};
let activeFilter = 'all';
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const playingAudio = {};
const audioBuffers = {};
let activeTab = 'audio';
let libraryData = null;
let visualData = null;

// Pipeline status tracking
const pipeline = {
  active: false,
  type: null,        // 'audio-regen' | 'audio-single' | 'visual'
  phase: null,       // visual phase name or null
  currentItem: null,
  currentStatus: null,
  index: 0,
  total: 0,
  succeeded: 0,
  failed: 0,
  startedAt: null,
  elapsedTimer: null,
  logCount: 0,
  errorCount: 0,
};

function setStatusText(parts) {
  // parts: [{text, dim?}] — build with textContent, using spans for dim segments
  const el = document.getElementById('status-text');
  el.replaceChildren();
  for (const p of parts) {
    const span = document.createElement('span');
    span.textContent = p.text;
    if (!p.dim) span.style.color = 'var(--text)';
    el.appendChild(span);
  }
}

function pipelineStart(type, phase) {
  pipeline.active = true;
  pipeline.type = type;
  pipeline.phase = phase || null;
  pipeline.currentItem = null;
  pipeline.currentStatus = null;
  pipeline.index = 0;
  pipeline.total = 0;
  pipeline.succeeded = 0;
  pipeline.failed = 0;
  pipeline.startedAt = Date.now();
  pipeline.logCount = 0;
  pipeline.errorCount = 0;

  const bar = document.getElementById('status-bar');
  const indicator = document.getElementById('status-indicator');
  const fill = document.getElementById('status-progress-fill');
  indicator.className = 'status-indicator';
  fill.className = 'status-progress-fill';
  fill.style.width = '0%';
  bar.classList.add('active');

  updateStatusText();
  clearInterval(pipeline.elapsedTimer);
  pipeline.elapsedTimer = setInterval(updateElapsed, 1000);
  updateElapsed();

  const logCount = document.getElementById('log-count');
  logCount.textContent = '0';
  logCount.classList.remove('has-errors');
}

function pipelineProgress(item, status, index, total) {
  pipeline.currentItem = item;
  pipeline.currentStatus = status;
  if (index != null) pipeline.index = index;
  if (total != null) pipeline.total = total;

  const pct = pipeline.total > 0 ? Math.round((pipeline.index / pipeline.total) * 100) : 0;
  document.getElementById('status-progress-fill').style.width = pct + '%';
  document.getElementById('status-progress-label').textContent =
    pipeline.total > 0 ? `${pipeline.index}/${pipeline.total}` : '';
  updateStatusText();
}

function pipelineDone(item, index, total) {
  pipeline.succeeded++;
  if (index != null) pipeline.index = index;
  if (total != null) pipeline.total = total;

  const pct = pipeline.total > 0 ? Math.round((pipeline.index / pipeline.total) * 100) : 0;
  document.getElementById('status-progress-fill').style.width = pct + '%';
  document.getElementById('status-progress-label').textContent =
    pipeline.total > 0 ? `${pipeline.index}/${pipeline.total}` : '';
  updateStatusText();
}

function pipelineError(item, error, index, total) {
  pipeline.failed++;
  pipeline.errorCount++;
  if (index != null) pipeline.index = index;
  if (total != null) pipeline.total = total;

  const logCount = document.getElementById('log-count');
  logCount.classList.add('has-errors');
  updateStatusText();
}

function pipelineComplete() {
  pipeline.active = false;
  clearInterval(pipeline.elapsedTimer);

  const indicator = document.getElementById('status-indicator');
  const fill = document.getElementById('status-progress-fill');

  if (pipeline.failed > 0) {
    indicator.className = 'status-indicator error';
    fill.classList.add('error');
  } else {
    indicator.className = 'status-indicator done';
    fill.classList.add('done');
    fill.style.width = '100%';
  }

  const label = pipeline.type === 'visual' ? 'pipeline' : 'generation';
  if (pipeline.failed > 0) {
    setStatusText([
      { text: label + ' finished — ' },
      { text: pipeline.succeeded + ' ok, ' + pipeline.failed + ' failed', dim: true },
    ]);
  } else {
    setStatusText([
      { text: label + ' complete — ' },
      { text: pipeline.succeeded + ' succeeded', dim: true },
    ]);
  }

  // Auto-hide status bar after 8s on success
  if (pipeline.failed === 0) {
    setTimeout(() => {
      if (!pipeline.active) document.getElementById('status-bar').classList.remove('active');
    }, 8000);
  }
}

function updateStatusText() {
  const typeLabel = pipeline.type === 'visual'
    ? (pipeline.phase ? pipeline.phase : 'visual')
    : 'audio';
  const statusLabel = pipeline.currentStatus || 'starting';
  const item = pipeline.currentItem || '…';
  setStatusText([
    { text: typeLabel + ' ', dim: true },
    { text: statusLabel + ' ' },
    { text: item, dim: true },
  ]);
}

function updateElapsed() {
  if (!pipeline.startedAt) return;
  const secs = Math.floor((Date.now() - pipeline.startedAt) / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  document.getElementById('status-elapsed').textContent = m > 0
    ? `${m}m ${s.toString().padStart(2, '0')}s`
    : `${s}s`;
}

// =============================================================================
// Waveform & Playback
// =============================================================================

async function renderWaveform(canvas, soundId) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;

  // Loading state
  ctx.fillStyle = '#131320';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = '#555570';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.fillText('Loading...', 8, h / 2 + 4);

  try {
    const res = await fetch(`/api/projects/${currentProject}/sounds/${soundId}/audio`);
    const buffer = await res.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(buffer);
    audioBuffers[soundId] = audioBuffer;

    const data = audioBuffer.getChannelData(0);
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#131320';
    ctx.fillRect(0, 0, w, h);

    // Draw center line
    ctx.strokeStyle = '#1e1e3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    // Draw waveform with gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, '#00e5ff');
    gradient.addColorStop(0.5, '#00e5ffcc');
    gradient.addColorStop(1, '#00e5ff');

    ctx.fillStyle = gradient;

    const step = Math.ceil(data.length / w);
    for (let i = 0; i < w; i++) {
      const start = i * step;
      const end = Math.min(start + step, data.length);
      let min = 1, max = -1;
      for (let j = start; j < end; j++) {
        if (data[j] < min) min = data[j];
        if (data[j] > max) max = data[j];
      }
      const yMin = ((1 + min) / 2) * h;
      const yMax = ((1 + max) / 2) * h;
      ctx.fillRect(i, yMax, 1, yMin - yMax || 1);
    }
  } catch {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#131320';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#ff6b35';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.fillText('Failed to load audio', 8, h / 2 + 4);
  }
}

function togglePlay(soundId) {
  if (playingAudio[soundId]) {
    playingAudio[soundId].stop();
    delete playingAudio[soundId];
    const btn = document.getElementById(`play-${soundId}`);
    if (btn) btn.classList.remove('playing');
    return;
  }

  const buffer = audioBuffers[soundId];
  if (!buffer) return;

  // Resume audio context if suspended (browser policy)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start();
  playingAudio[soundId] = source;

  const btn = document.getElementById(`play-${soundId}`);
  if (btn) btn.classList.add('playing');

  source.onended = () => {
    delete playingAudio[soundId];
    if (btn) btn.classList.remove('playing');
  };
}

  seedInput.id = `seed-${id}`;
  seedInput.value = sound.seed ?? '';
  seedInput.placeholder = 'auto';

  const backendLabel = document.createElement('label');

  backendSelect.id = `backend-${id}`;

  return card;

function renderAudio() {
  if (currentProject === '__library__') {
    renderLibraryView();
  } else {
    renderProjectSlots();
  }
}

function renderLibraryView() {
  const container = document.getElementById('audio-container');
  container.replaceChildren();

  if (!libraryData?.sounds || Object.keys(libraryData.sounds).length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Global library is empty. Import sounds from a project or create new ones.';
    container.appendChild(empty);
    return;
  }

  const entries = Object.entries(libraryData.sounds);
  const filtered = entries.filter(([, s]) => {
    if (activeFilter === 'sfx') return s.category.startsWith('sfx');
    if (activeFilter === 'music') return s.category.startsWith('music');
    if (activeFilter === 'flagged') return !!s.flagged;
    return true;
  });

  // Group by category
  const byCategory = {};
  for (const [id, sound] of filtered) {
    if (!byCategory[sound.category]) byCategory[sound.category] = [];
    byCategory[sound.category].push([id, sound]);
  }

  const canvases = [];

  for (const [category, sounds] of Object.entries(byCategory).sort(([a], [b]) => a.localeCompare(b))) {
    const header = document.createElement('h2');
    header.className = 'section-header';
    header.textContent = `${category} \u2014 ${sounds.length} sounds`;
    container.appendChild(header);

    for (const [id, sound] of sounds) {
      const card = createLibraryCard(id, sound);
      container.appendChild(card);
      const canvas = card.querySelector('canvas');
      if (canvas) canvases.push([id, canvas]);
    }
  }

  for (const [id, canvas] of canvases) {
    renderLibraryWaveform(canvas, id);
  }

  // Add to Library form
  const addHeader = document.createElement('h2');
  addHeader.className = 'section-header';
  addHeader.textContent = 'Add to Library';
  container.appendChild(addHeader);

  const addForm = document.createElement('div');
  addForm.className = 'add-slot-row';
  addForm.style.flexWrap = 'wrap';

  const idInput = document.createElement('input');
  idInput.type = 'text';
  idInput.placeholder = 'ID (e.g., explosion)';
  idInput.id = 'new-lib-id';
  addForm.appendChild(idInput);

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.placeholder = 'Display name';
  nameInput.id = 'new-lib-name';
  addForm.appendChild(nameInput);

  const catInput = document.createElement('input');
  catInput.type = 'text';
  catInput.placeholder = 'Category (e.g., sfx/weapons)';
  catInput.id = 'new-lib-category';
  addForm.appendChild(catInput);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-primary';
  addBtn.textContent = 'Add Sound';
  addBtn.addEventListener('click', async () => {
    const newId = document.getElementById('new-lib-id').value.trim();
    const newName = document.getElementById('new-lib-name').value.trim();
    const newCat = document.getElementById('new-lib-category').value.trim();
    if (!newId || !newName || !newCat) {
      appendLog('ID, name, and category are required', 'error');
      alert('Missing required fields: ID, name, and category are all required.');
      return;
    }
    try {
      await fetchJSON('/api/library', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: newId, name: newName, category: newCat }),
      });
      libraryData = await fetchJSON('/api/library');
      document.getElementById('new-lib-id').value = '';
      document.getElementById('new-lib-name').value = '';
      document.getElementById('new-lib-category').value = '';
      renderAudio();
      appendLog(`Added ${newId} to library`, 'success');
    } catch (err) {
      appendLog(err.message, 'error');
    }
  });
  addForm.appendChild(addBtn);

  container.appendChild(addForm);
}

  return card;
}

async function regenerateLibrarySound(id, btn, card, canvas) {
  // Save current settings first
  const prompt = document.getElementById(`lib-prompt-${id}`)?.value;
  const duration = parseFloat(document.getElementById(`lib-duration-${id}`)?.value) || null;
  const seedVal = document.getElementById(`lib-seed-${id}`)?.value;
  const seed = seedVal ? parseInt(seedVal) : null;

  try {
    await fetchJSON(`/api/library/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, duration, seed }),
    });
  } catch { /* non-fatal — proceed with generation */ }

  btn.disabled = true;
  btn.textContent = 'Generating…';
  card.style.borderColor = 'var(--cyan)';
  pipelineStart('audio-single');

  const logPanel = document.getElementById('regen-log');
  logPanel.hidden = false;
  logPanel.classList.remove('collapsed');
  appendLog(`Generating ${id}...`, 'dim');

  try {
    const res = await fetch(`/api/library/${id}/generate`, { method: 'POST' });

    if (res.status === 409) {
      btn.textContent = 'Busy';
      pipelineError(id, 'Already in progress');
      pipelineComplete();
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Regen'; card.style.borderColor = ''; }, 2000);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let newSeed = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7);
        } else if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (eventType === 'progress') {
              btn.textContent = data.status === 'processing' ? 'Processing…' : 'Generating…';
              pipelineProgress(id, data.status);
              appendLog(`${data.status} ${id}${data.backend ? ' via ' + data.backend : ''}`, 'dim');
            }
            if (eventType === 'done') {
              newSeed = data.seed;
              pipelineDone(id);
              appendLog(`\u2713 ${id} (seed: ${data.seed})`, 'success');
            }
            if (eventType === 'error') {
              pipelineError(id, data.error);
              appendLog(`\u2717 ${id}: ${data.error}`, 'error');
              btn.textContent = 'Failed';
              card.style.borderColor = 'var(--orange)';
              setTimeout(() => { btn.disabled = false; btn.textContent = 'Regen'; card.style.borderColor = ''; }, 3000);
              pipelineComplete();
              return;
            }
            if (eventType === 'complete') {
              pipelineComplete();
            }
          } catch { /* ignore */ }
        }
      }
    }

    // Update seed display if a new one was returned
    if (newSeed != null) {
      const seedInput = document.getElementById(`lib-seed-${id}`);
      if (seedInput) seedInput.value = newSeed;
    }

    // Clear cached audio buffer and re-render waveform
    delete audioBuffers[`lib-${id}`];
    await renderLibraryWaveform(canvas, id);

    card.classList.add('save-flash');
    setTimeout(() => card.classList.remove('save-flash'), 600);
  } catch (err) {
    btn.textContent = 'Error';
    card.style.borderColor = 'var(--orange)';
    setTimeout(() => { card.style.borderColor = ''; }, 3000);
  }

  btn.disabled = false;
  btn.textContent = 'Regen';
  card.style.borderColor = '';
}

async function renderLibraryWaveform(canvas, soundId) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;

  ctx.fillStyle = '#131320';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = '#555570';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.fillText('Loading...', 8, h / 2 + 4);

  try {
    const res = await fetch(`/api/library/${soundId}/audio`);
    if (!res.ok) throw new Error('Not found');
    const buffer = await res.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(buffer);
    audioBuffers[`lib-${soundId}`] = audioBuffer;

    const data = audioBuffer.getChannelData(0);
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#131320';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#1e1e3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    const gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, '#00e5ff');
    gradient.addColorStop(0.5, '#00e5ffcc');
    gradient.addColorStop(1, '#00e5ff');
    ctx.fillStyle = gradient;

    const step = Math.ceil(data.length / w);
    for (let i = 0; i < w; i++) {
      const start = i * step;
      const end = Math.min(start + step, data.length);
      let min = 1, max = -1;
      for (let j = start; j < end; j++) {
        if (data[j] < min) min = data[j];
        if (data[j] > max) max = data[j];
      }
      const yMin = ((1 + min) / 2) * h;
      const yMax = ((1 + max) / 2) * h;
      ctx.fillRect(i, yMax, 1, yMin - yMax || 1);
    }
  } catch {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#131320';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#555570';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.fillText('No audio on NAS', 8, h / 2 + 4);
  }
}

function toggleLibraryPlay(soundId) {
  const bufKey = `lib-${soundId}`;
  if (playingAudio[bufKey]) {
    playingAudio[bufKey].stop();
    delete playingAudio[bufKey];
    const btn = document.getElementById(`play-lib-${soundId}`);
    if (btn) btn.classList.remove('playing');
    return;
  }

  const buffer = audioBuffers[bufKey];
  if (!buffer) return;

  if (audioCtx.state === 'suspended') audioCtx.resume();

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start();
  playingAudio[bufKey] = source;

  const btn = document.getElementById(`play-lib-${soundId}`);
  if (btn) btn.classList.add('playing');

  source.onended = () => {
    delete playingAudio[bufKey];
    if (btn) btn.classList.remove('playing');
  };
}

function renderProjectSlots() {
  const container = document.getElementById('audio-container');
  container.replaceChildren();

  // Build list of library sounds for dropdown
  const libSounds = libraryData?.sounds ? Object.entries(libraryData.sounds) : [];

  // Get project's assigned slots from library
  const projectName = currentProject;
  const assignedSlots = [];
  for (const [id, sound] of libSounds) {
    const assignment = sound.assignedTo?.[projectName];
    if (assignment) {
      assignedSlots.push({ libraryId: id, sound, targetPath: assignment.targetPath, syncedAt: assignment.syncedAt });
    }
  }

  // Group by type (sfx/music based on targetPath or category)
  const sfxSlots = assignedSlots.filter(s => s.sound.category.startsWith('sfx') || s.targetPath.startsWith('sfx'));
  const musicSlots = assignedSlots.filter(s => s.sound.category.startsWith('music') || s.targetPath.startsWith('music'));

  const filtered = activeFilter === 'sfx' ? sfxSlots
    : activeFilter === 'music' ? musicSlots
    : [...sfxSlots, ...musicSlots];

  if (filtered.length === 0 && activeFilter === 'all') {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = `No audio slots assigned to ${projectName}. Use the dropdowns below to assign sounds from the global library.`;
    container.appendChild(empty);
  }

  // SFX section
  if ((activeFilter === 'all' || activeFilter === 'sfx') && sfxSlots.length > 0) {
    const header = document.createElement('h2');
    header.className = 'section-header';
    header.textContent = `SFX Slots \u2014 ${sfxSlots.length}`;
    container.appendChild(header);
    for (const slot of sfxSlots) {
      container.appendChild(createSlotRow(slot, libSounds, projectName));
    }
  }

  if ((activeFilter === 'all' || activeFilter === 'music') && musicSlots.length > 0) {
    const header = document.createElement('h2');
    header.className = 'section-header';
    header.textContent = `Music Slots \u2014 ${musicSlots.length}`;
    container.appendChild(header);
    for (const slot of musicSlots) {
      container.appendChild(createSlotRow(slot, libSounds, projectName));
    }
  }

  // Add new slot section
  const addHeader = document.createElement('h2');
  addHeader.className = 'section-header';
  addHeader.textContent = 'Add Audio Slot';
  container.appendChild(addHeader);

  const addRow = document.createElement('div');
  addRow.className = 'add-slot-row';

  const pathInput = document.createElement('input');
  pathInput.type = 'text';
  pathInput.placeholder = 'Target path (e.g., sfx/explosion)';
  pathInput.id = 'new-slot-path';
  addRow.appendChild(pathInput);

  const soundSelect = document.createElement('select');
  soundSelect.className = 'slot-select';
  soundSelect.id = 'new-slot-sound';

  const emptyOpt = document.createElement('option');
  emptyOpt.value = '';
  emptyOpt.textContent = 'Select from library...';
  soundSelect.appendChild(emptyOpt);

  // Group library sounds by category in dropdown
  const catGroups = {};
  for (const [id, sound] of libSounds) {
    if (!catGroups[sound.category]) catGroups[sound.category] = [];
    catGroups[sound.category].push([id, sound]);
  }
  for (const [cat, sounds] of Object.entries(catGroups).sort(([a], [b]) => a.localeCompare(b))) {
    const group = document.createElement('optgroup');
    group.label = cat;
    for (const [id, sound] of sounds) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = `${sound.name || id}`;
      group.appendChild(opt);
    }
    soundSelect.appendChild(group);
  }
  addRow.appendChild(soundSelect);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-primary';
  addBtn.textContent = 'Assign';
  addBtn.addEventListener('click', async () => {
    const targetPath = document.getElementById('new-slot-path').value.trim();
    const soundId = document.getElementById('new-slot-sound').value;
    if (!targetPath || !soundId) {
      alert('Enter a target path and select a sound');
      return;
    }
    await fetchJSON(`/api/library/${soundId}/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: projectName, targetPath }),
    });
    libraryData = await fetchJSON('/api/library');
    renderAudio();
    appendLog(`Assigned ${soundId} \u2192 ${projectName}/${targetPath}`, 'success');
  });
  addRow.appendChild(addBtn);

  container.appendChild(addRow);
}

function createSlotRow(slot, libSounds, projectName) {
  const row = document.createElement('div');
  row.className = 'slot-row';

  // Slot name (target path)
  const nameEl = document.createElement('span');
  nameEl.className = 'slot-name';
  nameEl.textContent = slot.targetPath;
  row.appendChild(nameEl);

  // Play button
  const playBtn = document.createElement('button');
  playBtn.className = 'slot-play';
  playBtn.textContent = '\u25B6';
  playBtn.addEventListener('click', () => toggleLibraryPlay(slot.libraryId));
  row.appendChild(playBtn);

  // Dropdown to change library sound
  const select = document.createElement('select');
  select.className = 'slot-select';

  // Group by category
  const catGroups = {};
  for (const [id, sound] of libSounds) {
    if (!catGroups[sound.category]) catGroups[sound.category] = [];
    catGroups[sound.category].push([id, sound]);
  }
  for (const [cat, sounds] of Object.entries(catGroups).sort(([a], [b]) => a.localeCompare(b))) {
    const group = document.createElement('optgroup');
    group.label = cat;
    for (const [id, sound] of sounds) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = sound.name || id;
      opt.selected = id === slot.libraryId;
      group.appendChild(opt);
    }
    select.appendChild(group);
  }

  select.addEventListener('change', async () => {
    const newSoundId = select.value;
    // Unassign old
    await fetchJSON(`/api/library/${slot.libraryId}/unassign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: projectName }),
    });
    // Assign new
    await fetchJSON(`/api/library/${newSoundId}/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: projectName, targetPath: slot.targetPath }),
    });
    libraryData = await fetchJSON('/api/library');
    row.classList.add('save-flash');
    setTimeout(() => row.classList.remove('save-flash'), 600);
    appendLog(`Changed ${slot.targetPath} \u2192 ${newSoundId}`, 'success');
  });
  row.appendChild(select);

  // Sync status
  const status = document.createElement('span');
  const isSynced = slot.syncedAt && slot.sound.createdAt && new Date(slot.syncedAt) >= new Date(slot.sound.createdAt);
  status.className = `slot-status ${isSynced ? 'synced' : 'unsynced'}`;
  status.textContent = isSynced ? 'synced' : 'stale';
  row.appendChild(status);

  // Remove button
  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn-danger';
  removeBtn.textContent = '\u00D7';
  removeBtn.style.padding = '0.2rem 0.5rem';
  removeBtn.addEventListener('click', async () => {
    await fetchJSON(`/api/library/${slot.libraryId}/unassign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: projectName }),
    });
    libraryData = await fetchJSON('/api/library');
    renderAudio();
    appendLog(`Removed ${slot.targetPath} from ${projectName}`, 'dim');
  });
  row.appendChild(removeBtn);

  return row;
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(0) + 'KB';
  return (bytes / 1048576).toFixed(1) + 'MB';
}

async function startRegeneration() {
  const logPanel = document.getElementById('regen-log');
  const logContent = document.getElementById('log-content');
  const regenBtn = document.getElementById('regen-btn');

  logPanel.hidden = false;
  logPanel.classList.remove('collapsed');
  logContent.replaceChildren();
  regenBtn.disabled = true;
  regenBtn.textContent = 'Regenerating…';
  pipelineStart('audio-regen');

  try {
    const url = currentProject === '__library__'
      ? '/api/library/regenerate-flagged'
      : `/api/projects/${currentProject}/regenerate`;
    const res = await fetch(url, { method: 'POST' });

    if (res.status === 409) {
      appendLog('Regeneration already in progress', 'error');
      regenBtn.disabled = false;
      regenBtn.textContent = 'Regenerate Flagged';
      return;
    }

    if (res.status === 400) {
      const err = await res.json();
      appendLog(err.error || 'No flagged sounds', 'warn');
      regenBtn.disabled = false;
      regenBtn.textContent = 'Regenerate Flagged';
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7);
        } else if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            handleSSEEvent(eventType, data);
          } catch { /* ignore parse errors */ }
        }
      }
    }
  } catch (err) {
    appendLog(err.message, 'error');
  }

  regenBtn.disabled = false;
  regenBtn.textContent = 'Regenerate Flagged';
  await loadProjectData();
}

function handleSSEEvent(type, data) {
  switch (type) {
    case 'progress':
      pipelineProgress(data.sound, data.status, data.index, data.total);
      appendLog(`[${data.index}/${data.total}] ${data.status} ${data.sound}${data.backend ? ' via ' + data.backend : ''}`, 'dim');
      break;
    case 'done':
      pipelineDone(data.sound, data.index, data.total);
      appendLog(`[${data.index}/${data.total}] ✓ ${data.sound} (seed: ${data.seed}, ${data.duration}s)`, 'success');
      break;
    case 'error':
      pipelineError(data.sound, data.error, data.index, data.total);
      appendLog(`[${data.index}/${data.total}] ✗ ${data.sound}: ${data.error}`, 'error');
      break;
    case 'complete':
      pipelineComplete();
      appendLog(`Complete: ${data.succeeded} ok, ${data.failed} failed`, data.failed > 0 ? 'warn' : 'success');
      break;
  }
}

function appendLog(msg, level) {
  const logContent = document.getElementById('log-content');
  const div = document.createElement('div');
  if (level) div.className = level;
  const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
  div.textContent = `[${time}] ${msg}`;
  logContent.appendChild(div);
  logContent.scrollTop = logContent.scrollHeight;

  // Update log count badge
  pipeline.logCount++;
  const logCountEl = document.getElementById('log-count');
  logCountEl.textContent = pipeline.logCount;
}

function timeAgo(isoString) {
  if (!isoString) return 'never';
  const diff = Date.now() - new Date(isoString).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours / 24)}d ago`;
}

function renderVisualAssets() {
  const container = document.getElementById('visual-container');

  if (!visualData?.assets || Object.keys(visualData.assets).length === 0) {
    const empty = document.createElement('div');

  }

  const byCategory = {};

  const nameEl = document.createElement('span');
  nameEl.className = 'sound-name';
  nameEl.textContent = asset.name || id;
  headerRow.appendChild(nameEl);
  for (const tag of (asset.tags || [])) {
    const tagEl = document.createElement('span');
    tagEl.className = 'badge badge-type';
    tagEl.textContent = tag;
    headerRow.appendChild(tagEl);
  }
  card.appendChild(headerRow);

  // Pipeline indicator
  const pipeline = document.createElement('div');
  pipeline.className = 'pipeline';
  const phases = ['concept', 'model', 'render', 'pack'];
  const statusIcon = { done: '\u25CF', pending: '\u25CB', generating: '\u25D0', error: '\u2717' };

  for (const p of phases) {
    const phaseData = asset.pipeline?.[p];
    if (!phaseData && p === 'model') continue;
    if (!first) {
      const arrow = document.createElement('span');

      arrow.textContent = '\u2192';
      pipeline.appendChild(arrow);
    }

  posesInput.value = (asset.poses || []).join(', ');
  posesInput.id = `vposes-${id}`;
  posesInput.style.width = '200px';

  row.appendChild(posesLabel);

      .map(([proj, info]) => `${proj}/${info.atlas} (synced ${timeAgo(info.syncedAt)})`)
      .join(', ');
    controls.appendChild(assignInfo);

  card.appendChild(controls);

  // Actions

  actions.className = 'card-actions';

    await fetchJSON(`/api/visual-library/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: document.getElementById(`vprompt-${id}`).value,
        poses: document.getElementById(`vposes-${id}`).value.split(',').map(s => s.trim()).filter(Boolean),
      }),
    });
    card.classList.add('save-flash');
    setTimeout(() => card.classList.remove('save-flash'), 600);
  });
  actions.appendChild(saveBtn);

  for (const phase of ['concept', 'model', 'render', 'pack']) {
    if (phase === 'model' && !asset.pipeline?.model) continue;
    const btn = document.createElement('button');
    btn.textContent = phase.charAt(0).toUpperCase() + phase.slice(1);
    btn.addEventListener('click', () => startVisualGeneration(id, phase));
    actions.appendChild(btn);

  fullBtn.className = 'btn-primary';
  fullBtn.textContent = 'Full Pipeline';
  fullBtn.addEventListener('click', () => startVisualGeneration(id, 'full'));

  assignBtn.addEventListener('click', async () => {

      body: JSON.stringify({ project: currentProject, atlas: asset.category }),
    });
    card.classList.add('save-flash');
    setTimeout(() => card.classList.remove('save-flash'), 600);
  });
  actions.appendChild(assignBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-danger';
  delBtn.textContent = 'Del';
  delBtn.addEventListener('click', async () => {
    if (!confirm(`Delete ${id}?`)) return;
    await fetchJSON(`/api/visual-library/${id}`, { method: 'DELETE' });
    visualData = await fetchJSON('/api/visual-library');
    renderVisualAssets();
  });
  actions.appendChild(delBtn);

  card.appendChild(actions);
  return card;
}

async function startVisualGeneration(assetId, phase) {
  const logPanel = document.getElementById('regen-log');
  const logContent = document.getElementById('log-content');
  logPanel.hidden = false;
  logPanel.classList.remove('collapsed');
  logContent.replaceChildren();
  pipelineStart('visual', phase);

  appendLog(`Starting ${phase} for ${assetId}...`, 'dim');

  try {
    const res = await fetch(`/api/visual-library/${assetId}/generate/${phase}`, { method: 'POST' });
    if (res.status === 409) {
      appendLog('Visual generation already in progress', 'error');
      pipelineError(assetId, 'Already in progress');
      pipelineComplete();
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) eventType = line.slice(7);
        else if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (eventType === 'progress') {
              pipelineProgress(data.asset, data.status);
              appendLog(`[${data.phase}] ${data.status} ${data.asset}`, 'dim');
            } else if (eventType === 'done') {
              pipelineDone(data.asset);
              appendLog(`[${data.phase}] \u2713 ${data.asset}${data.frameCount ? ` (${data.frameCount} frames)` : ''}`, 'success');
            } else if (eventType === 'error') {
              pipelineError(data.asset, data.error);
              appendLog(`[${data.phase}] \u2717 ${data.asset}: ${data.error}`, 'error');
            } else if (eventType === 'complete') {
              pipelineComplete();
              appendLog(`Pipeline complete for ${data.asset}`, 'success');
            }
          } catch {}
        }
      }
    }
  } catch (err) {
    appendLog(err.message, 'error');
    pipelineComplete();
  }

  visualData = await fetchJSON('/api/visual-library');
  renderVisualAssets();
}

// =============================================================================
// Event Wiring
// =============================================================================

document.getElementById('project-select').addEventListener('change', (e) => {
  currentProject = e.target.value;
  // Hide scan for library view, show for projects; regen always visible for audio tab
  document.getElementById('scan-btn').style.display = currentProject === '__library__' ? 'none' : '';
  document.getElementById('regen-btn').style.display = activeTab === 'audio' ? '' : 'none';
  loadProjectData();
});

document.getElementById('scan-btn').addEventListener('click', doScan);
document.getElementById('regen-btn').addEventListener('click', startRegeneration);

document.getElementById('log-toggle').addEventListener('click', () => {
  const panel = document.getElementById('regen-log');
  const icon = document.getElementById('log-toggle-icon');
  panel.classList.toggle('collapsed');
  icon.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderAudio();
  });
});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('audio-container').style.display = activeTab === 'audio' ? '' : 'none';
    document.getElementById('visual-container').style.display = activeTab === 'visual' ? '' : 'none';
    const isLibrary = currentProject === '__library__';
    document.getElementById('regen-btn').style.display = activeTab === 'audio' ? '' : 'none';
    document.getElementById('scan-btn').style.display = (activeTab === 'audio' && !isLibrary) ? '' : 'none';
    document.querySelector('.filter-bar').style.display = activeTab === 'audio' ? '' : 'none';
    if (activeTab === 'audio') renderAudio();
    if (activeTab === 'visual') renderVisualAssets();
  });
});

// Sync button
document.getElementById('sync-btn').addEventListener('click', async () => {
  if (currentProject === '__library__') {
    appendLog('Select a project to sync', 'warn');
    return;
  }
  if (activeTab === 'audio') {
    const result = await fetchJSON(`/api/projects/${currentProject}/sync`, { method: 'POST' });
    appendLog(`Audio sync: ${result.count} sounds updated`, result.count > 0 ? 'success' : 'dim');
    libraryData = await fetchJSON('/api/library');
    renderAudio();
  } else {
    const result = await fetchJSON(`/api/projects/${currentProject}/sync-visual`, { method: 'POST' });
    appendLog(`Visual sync: ${result.count} assets updated`, result.count > 0 ? 'success' : 'dim');
  }
});

// Init
document.addEventListener('DOMContentLoaded', loadProjects);
</script>
