function createVisualCard(id, asset) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `vcard-${id}`;

  // Header
  const headerRow = document.createElement('div');
  headerRow.className = 'card-header';
  const nameEl = document.createElement('span');
  nameEl.className = 'sound-name';
  nameEl.textContent = asset.name || id;
  headerRow.appendChild(nameEl);

  const catBadge = document.createElement('span');
  catBadge.className = 'badge badge-type';
  catBadge.textContent = asset.category;
  headerRow.appendChild(catBadge);

  for (const tag of (asset.tags || [])) {
    const tagEl = document.createElement('span');
    tagEl.className = 'badge badge-type';
    tagEl.textContent = tag;
    headerRow.appendChild(tagEl);
  }
  card.appendChild(headerRow);

  // Controls (prompt, backend, poses)
  const controls = document.createElement('div');
  controls.className = 'controls';

  const promptLabel = document.createElement('label');
  promptLabel.textContent = 'Prompt';
  const promptInput = document.createElement('textarea');
  promptInput.rows = 2;
  promptInput.value = asset.prompt || '';
  promptInput.id = `vprompt-${id}`;
  controls.appendChild(promptLabel);
  controls.appendChild(promptInput);

  const cbRow = document.createElement('div');
  cbRow.className = 'controls-row';
  const cbLabel = document.createElement('label');
  cbLabel.textContent = 'Concept Backend';
  const cbSelect = document.createElement('select');
  cbSelect.id = `vcb-${id}`;
  cbSelect.style.width = '200px';
  const conceptBackends = [
    { value: 'siliconflow', label: 'SiliconFlow / Flux (cloud API)' },
    { value: 'gemini-imagen', label: 'Gemini Imagen (cloud API)' },
    { value: 'diffusers', label: 'Juggernaut XL (local GPU)' },
    { value: '', label: 'ComfyUI (local GPU, default)' },
  ];
  for (const opt of conceptBackends) {
    const option = document.createElement('option');
    option.value = opt.value;
    option.textContent = opt.label;
    if ((asset.conceptBackend || '') === opt.value) option.selected = true;
    cbSelect.appendChild(option);
  }
  cbLabel.appendChild(cbSelect);
  cbRow.appendChild(cbLabel);

  // Model backend selector
  const mbLabel = document.createElement('label');
  mbLabel.textContent = 'Model Backend';
  const mbSelect = document.createElement('select');
  mbSelect.id = `vmb-${id}`;
  mbSelect.style.width = '200px';
  const modelBackends = [
    { value: '', label: 'Auto (fallback chain)' },
    { value: 'sketchfab', label: 'Sketchfab (sourced)' },
    { value: 'hunyuan3d-local', label: 'Hunyuan3D (local GPU)' },
    { value: 'triposr', label: 'TripoSR (local GPU)' },
    { value: 'hyper3d', label: 'Hyper3D Rodin (cloud)' },
    { value: 'hunyuan3d', label: 'Hunyuan3D (fal.ai cloud)' },
    { value: 'meshy', label: 'Meshy (cloud)' },
    { value: 'polyhaven', label: 'PolyHaven (free)' },
  ];
  for (const opt of modelBackends) {
    const option = document.createElement('option');
    option.value = opt.value;
    option.textContent = opt.label;
    if ((asset.modelBackend || '') === opt.value) option.selected = true;
    mbSelect.appendChild(option);
  }
  mbLabel.appendChild(mbSelect);
  cbRow.appendChild(mbLabel);

  const posesLabel = document.createElement('label');
  posesLabel.textContent = 'Poses';
  const posesInput = document.createElement('input');
  posesInput.value = (asset.poses || []).join(', ');
  posesInput.id = `vposes-${id}`;
  posesInput.style.width = '200px';
  posesLabel.appendChild(posesInput);
  cbRow.appendChild(posesLabel);
  controls.appendChild(cbRow);

  const saveBtn = document.createElement('button');
  saveBtn.textContent = 'Save';
  saveBtn.style.marginTop = '0.3rem';
  saveBtn.addEventListener('click', async () => {
    await fetchJSON(`/api/visual-library/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: document.getElementById(`vprompt-${id}`).value,
        poses: document.getElementById(`vposes-${id}`).value.split(',').map(s => s.trim()).filter(Boolean),
        conceptBackend: document.getElementById(`vcb-${id}`).value || null,
        modelBackend: document.getElementById(`vmb-${id}`).value || null,
      }),
    });
    card.classList.add('save-flash');
    setTimeout(() => card.classList.remove('save-flash'), 600);
  });
  controls.appendChild(saveBtn);
  card.appendChild(controls);

  // Step-by-step pipeline with previews
  const pipelineSection = document.createElement('div');
  pipelineSection.className = 'pipeline-steps';

  const phases = ['concept', 'model', 'render', 'pack'];
  for (const phase of phases) {
    const phaseData = asset.pipeline?.[phase];
    if (!phaseData && phase === 'model') continue; // skip model for non-3D

    const status = phaseData?.status || 'pending';
    const phaseDiv = document.createElement('div');
    phaseDiv.className = `phase-preview ${status}`;

    // Phase header with status + action button
    const phaseHeader = document.createElement('div');
    phaseHeader.className = 'phase-preview-header';

    const statusIcons = { done: '\u2714', pending: '\u25CB', generating: '\u25D0', error: '\u2717' };
    const phaseLabel = document.createElement('span');
    phaseLabel.className = 'phase-label';
    phaseLabel.textContent = phase;
    phaseHeader.appendChild(phaseLabel);

    const statusEl = document.createElement('span');
    statusEl.className = `phase-status ${status}`;
    statusEl.textContent = `${statusIcons[status] || '\u25CB'} ${status}`;
    if (phaseData?.generatedAt) statusEl.textContent += ` \u2014 ${timeAgo(phaseData.generatedAt)}`;
    if (phaseData?.backend) statusEl.textContent += ` (${phaseData.backend})`;
    phaseHeader.appendChild(statusEl);

    phaseDiv.appendChild(phaseHeader);

    // Preview content (different per phase)
    if (status === 'done') {
      if (phase === 'concept') {
        const img = document.createElement('img');
        img.className = 'preview-full';
        img.src = `/api/visual-library/${id}/concept?t=${Date.now()}`;
        img.alt = 'Concept';
        img.title = 'Click to open full size';
        img.addEventListener('click', () => window.open(img.src, '_blank'));
        phaseDiv.appendChild(img);
      }

      if (phase === 'model') {
        const viewBtn = document.createElement('button');
        viewBtn.className = 'btn-view3d';
        viewBtn.textContent = '\u25B6 View 3D';
        viewBtn.addEventListener('click', () => window.ModelViewer.open(id, asset.name || id));
        phaseDiv.appendChild(viewBtn);
        // Show source info if sourced from Sketchfab
        if (asset.sketchfabUid) {
          const srcBadge = document.createElement('span');
          srcBadge.className = 'source-badge';
          srcBadge.textContent = '\uD83C\uDFA8 Sketchfab: ' + asset.sketchfabUid.slice(0, 8) + '...';
          srcBadge.title = 'Sourced from Sketchfab UID: ' + asset.sketchfabUid;
          phaseDiv.appendChild(srcBadge);
        }
      }

      if (phase === 'render' && phaseData?.frameCount > 0) {
        const grid = document.createElement('div');
        grid.className = 'render-grid';
        grid.textContent = 'Loading frames...';
        // Async load frame list
        fetch(`/api/visual-library/${id}/renders`).then(r => r.json()).then(data => {
          grid.textContent = '';
          if (data.frames?.length > 0) {
            for (const frame of data.frames) {
              const img = document.createElement('img');
              img.src = `/api/visual-library/${id}/render-frame/${frame}`;
              img.alt = frame;
              img.title = frame.replace('.png', '');
              grid.appendChild(img);
            }
          } else {
            grid.textContent = 'No rendered frames found';
          }
        }).catch(() => { grid.textContent = 'Failed to load frames'; });
        phaseDiv.appendChild(grid);
      }

      if (phase === 'pack') {
        const img = document.createElement('img');
        img.className = 'atlas-preview';
        img.src = `/api/visual-library/${id}/atlas?t=${Date.now()}`;
        img.alt = 'Sprite Atlas';
        img.title = 'Packed sprite atlas';
        img.onerror = () => { img.style.display = 'none'; };
        phaseDiv.appendChild(img);
      }
    }

    // Phase action buttons
    const phaseActions = document.createElement('div');
    phaseActions.className = 'phase-actions';

    // Determine if this phase can run (previous phase must be done)
    const prevPhase = phases[phases.indexOf(phase) - 1];
    const isExternallySourced = asset.sketchfabUid || asset.modelBackend === 'sketchfab';
    const prevDone = !prevPhase || asset.pipeline?.[prevPhase]?.status === 'done'
      || (prevPhase === 'model' && !asset.pipeline?.model) // skip model check for non-3D
      || (prevPhase === 'concept' && phase === 'model' && isExternallySourced); // Sketchfab doesn't need concept
    const canRun = prevDone && status !== 'generating';

    if (status === 'done') {
      // Regenerate button
      const regenBtn = document.createElement('button');
      regenBtn.textContent = '\u21BB Redo';
      regenBtn.disabled = !canRun;
      regenBtn.addEventListener('click', () => startVisualGeneration(id, phase));
      phaseActions.appendChild(regenBtn);
    } else {
      // Generate button
      const genBtn = document.createElement('button');
      genBtn.className = canRun ? 'btn-primary' : '';
      genBtn.textContent = `Generate ${phase.charAt(0).toUpperCase() + phase.slice(1)}`;
      genBtn.disabled = !canRun;
      genBtn.addEventListener('click', () => startVisualGeneration(id, phase));
      phaseActions.appendChild(genBtn);
    }

    // Sketchfab search button for model phase
    if (phase === 'model') {
      const sfBtn = document.createElement('button');
      sfBtn.textContent = '\uD83D\uDD0D Sketchfab';
      sfBtn.title = 'Search Sketchfab for a 3D model';
      sfBtn.addEventListener('click', () => openSketchfabSearch(id, asset.name || id));
      phaseActions.appendChild(sfBtn);
    }

    phaseDiv.appendChild(phaseActions);
    pipelineSection.appendChild(phaseDiv);
  }

  card.appendChild(pipelineSection);

  // Assignment info
  if (asset.assignedTo && Object.keys(asset.assignedTo).length > 0) {
    const assignInfo = document.createElement('div');
    assignInfo.className = 'assign-info';
    assignInfo.textContent = 'Assigned: ' + Object.entries(asset.assignedTo)
      .map(([proj, info]) => `${proj}/${info.atlas} (synced ${timeAgo(info.syncedAt)})`)
      .join(', ');
    card.appendChild(assignInfo);
  }

  // Bottom actions
  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const fullBtn = document.createElement('button');
  fullBtn.className = 'btn-primary';
  fullBtn.textContent = 'Full Pipeline';
  fullBtn.addEventListener('click', () => startVisualGeneration(id, 'full'));
  actions.appendChild(fullBtn);

  const assignBtn = document.createElement('button');
  assignBtn.textContent = 'Assign';
  if (currentProject === '__library__') {
    assignBtn.disabled = true;
    assignBtn.title = 'Select a project first';
  }
  assignBtn.addEventListener('click', async () => {
    if (currentProject === '__library__') {
      appendLog('Select a project to assign assets', 'warn');
      return;
    }
    await fetchJSON(`/api/visual-library/${id}/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: currentProject, atlas: asset.category }),
    });
    card.classList.add('save-flash');
    setTimeout(() => card.classList.remove('save-flash'), 600);
  });
  actions.appendChild(assignBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-danger';
  delBtn.textContent = 'Delete';
  delBtn.addEventListener('click', async () => {
    if (!confirm(`Delete ${id}?`)) return;
    await fetchJSON(`/api/visual-library/${id}`, { method: 'DELETE' });
    visualData = await fetchJSON('/api/visual-library');
    renderVisualAssets();
  });
  actions.appendChild(delBtn);

  card.appendChild(actions);
  return card;
}

// ============ Sketchfab Search Modal ============
function openSketchfabSearch(assetId, assetName) {
  document.getElementById('sf-modal')?.remove();

  const modal = document.createElement('div');
  modal.id = 'sf-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center';
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

  const panel = document.createElement('div');
  panel.style.cssText = 'background:#1e293b;border-radius:12px;padding:1.5rem;width:700px;max-height:80vh;overflow-y:auto;color:#e2e8f0';

  const title = document.createElement('h3');
  title.style.cssText = 'margin:0 0 1rem;color:#38bdf8';
  title.textContent = 'Search Sketchfab for: ' + assetName;
  panel.appendChild(title);

  const form = document.createElement('div');
  form.style.cssText = 'display:flex;gap:0.5rem;margin-bottom:1rem';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = assetName + ' low poly game character';
  input.placeholder = 'Search Sketchfab...';
  input.style.cssText = 'flex:1;padding:0.5rem;border-radius:6px;border:1px solid #475569;background:#0f172a;color:#e2e8f0';
  const searchBtn = document.createElement('button');
  searchBtn.textContent = 'Search';
  searchBtn.style.cssText = 'padding:0.5rem 1rem;border-radius:6px;background:#38bdf8;color:#0f172a;border:none;cursor:pointer;font-weight:bold';
  form.appendChild(input);
  form.appendChild(searchBtn);
  panel.appendChild(form);

  const results = document.createElement('div');
  results.id = 'sf-results';
  results.textContent = 'Enter a search query and click Search';
  results.style.cssText = 'display:grid;gap:0.75rem';
  panel.appendChild(results);

  async function doSearch() {
    results.textContent = 'Searching...';
    try {
      const resp = await fetch('/api/sketchfab/search?q=' + encodeURIComponent(input.value) + '&count=12');
      const data = await resp.json();
      const models = Array.isArray(data) ? data : (data.results || []);
      while (results.firstChild) results.removeChild(results.firstChild);
      if (!models.length) { results.textContent = 'No results found'; return; }
      for (const model of models) {
        const card = document.createElement('div');
        card.style.cssText = 'display:flex;gap:0.75rem;padding:0.75rem;background:#0f172a;border-radius:8px;border:1px solid #334155;cursor:pointer;transition:border-color 0.2s';
        card.addEventListener('mouseenter', function() { this.style.borderColor = '#38bdf8'; });
        card.addEventListener('mouseleave', function() { this.style.borderColor = '#334155'; });

        const thumb = document.createElement('img');
        thumb.src = model.thumbnail || '';
        thumb.alt = model.name;
        thumb.style.cssText = 'width:100px;height:100px;object-fit:cover;border-radius:6px;background:#1e293b';
        card.appendChild(thumb);

        const info = document.createElement('div');
        info.style.cssText = 'flex:1;min-width:0';
        const nameEl = document.createElement('div');
        nameEl.style.cssText = 'font-weight:bold;color:#f1f5f9;margin-bottom:0.25rem';
        nameEl.textContent = model.name;
        info.appendChild(nameEl);
        const meta = document.createElement('div');
        meta.style.cssText = 'font-size:0.85rem;color:#94a3b8';
        meta.textContent = (model.faceCount ? model.faceCount.toLocaleString() : '?') + ' faces | ' + (model.author || 'Unknown') + ' | ' + (model.license || 'Unknown license');
        info.appendChild(meta);
        if (model.isAnimated) {
          const animBadge = document.createElement('span');
          animBadge.style.cssText = 'display:inline-block;margin-top:0.25rem;padding:2px 6px;background:#22c55e;color:#0f172a;border-radius:4px;font-size:0.75rem;font-weight:bold';
          animBadge.textContent = 'Animated';
          info.appendChild(animBadge);
        }
        card.appendChild(info);

        const useBtn = document.createElement('button');
        useBtn.textContent = 'Use';
        useBtn.style.cssText = 'padding:0.5rem 1rem;border-radius:6px;background:#22c55e;color:#0f172a;border:none;cursor:pointer;font-weight:bold;align-self:center;white-space:nowrap';
        useBtn.addEventListener('click', async function(e) {
          e.stopPropagation();
          this.disabled = true;
          this.textContent = 'Setting...';
          try {
            await fetch('/api/visual-library/' + assetId + '/source/sketchfab', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ uid: model.uid }),
            });
            this.textContent = 'Set!';
            this.style.background = '#38bdf8';
            setTimeout(function() { modal.remove(); loadVisualLibrary(); }, 800);
          } catch (err) {
            this.textContent = 'Error';
            this.style.background = '#ef4444';
          }
        });
        card.appendChild(useBtn);
        results.appendChild(card);
      }
    } catch (err) {
      results.textContent = 'Search failed: ' + err.message;
    }
  }

  searchBtn.addEventListener('click', doSearch);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });

  modal.appendChild(panel);
  document.body.appendChild(modal);
  input.focus();
  input.select();
}

async function startVisualGeneration(assetId, phase) {
  const logPanel = document.getElementById('regen-log');
  const logContent = document.getElementById('log-content');
  logPanel.hidden = false;
  logPanel.classList.remove('collapsed');
  logContent.replaceChildren();
  pipelineStart('visual', phase);

  appendLog(`Starting ${phase} for ${assetId}...`, 'dim');

  try {
    const res = await fetch(`/api/visual-library/${assetId}/generate/${phase}`, { method: 'POST' });
    if (res.status === 409) {
      appendLog('Visual generation already in progress', 'error');
      pipelineError(assetId, 'Already in progress');
      pipelineComplete();
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) eventType = line.slice(7);
        else if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (eventType === 'progress') {
              pipelineProgress(data.asset, data.status);
              appendLog(`[${data.phase}] ${data.status} ${data.asset}`, 'dim');
            } else if (eventType === 'done') {
              pipelineDone(data.asset);
              appendLog(`[${data.phase}] \u2713 ${data.asset}${data.frameCount ? ` (${data.frameCount} frames)` : ''}`, 'success');
            } else if (eventType === 'error') {
              pipelineError(data.asset, data.error);
              appendLog(`[${data.phase}] \u2717 ${data.asset}: ${data.error}`, 'error');
            } else if (eventType === 'complete') {
              pipelineComplete();
              appendLog(`Pipeline complete for ${data.asset}`, 'success');
            }
          } catch {}
        }
      }
    }
  } catch (err) {
    appendLog(err.message, 'error');
    pipelineComplete();
  }

  visualData = await fetchJSON('/api/visual-library');
  renderVisualAssets();
}

    renderAudio();

    appendLog(`Visual sync: ${result.count} assets updated`, result.count > 0 ? 'success' : 'dim');
  }
});

// Worker status polling
let _lastWorkerConnected = false;
async function pollWorkerStatus() {
  try {
    const res = await fetch('/api/worker-status');
    const data = await res.json();
    const dot = document.getElementById('worker-dot');
    const label = document.getElementById('worker-label');
    if (data.connected) {
      dot.style.background = '#50fa7b';
      label.textContent = `${data.hostname} \u00b7 ${data.gpu}`;
      label.style.color = '#50fa7b';
      if (!_lastWorkerConnected) checkPrerequisites();
    } else {
      dot.style.background = '#6272a4';
      label.textContent = 'No GPU worker';
      label.style.color = '#6272a4';
      if (_lastWorkerConnected) checkPrerequisites();
    }
    _lastWorkerConnected = data.connected;
  } catch { /* silent */ }
}
pollWorkerStatus();
setInterval(pollWorkerStatus, 5000);
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

window.ModelViewer = {
  _overlay: null,
  _renderer: null,
  _scene: null,
  _camera: null,
  _controls: null,
  _animId: null,
  _gridHelper: null,

  open(assetId, assetName) {
    this.close();

    // Build overlay DOM
    const overlay = document.createElement('div');
    overlay.className = 'model-viewer-overlay';
    overlay.addEventListener('click', (e) => { if (e.target === overlay) this.close(); });

    const panel = document.createElement('div');
    panel.className = 'model-viewer-panel';

    // Header
    const header = document.createElement('div');
    header.className = 'model-viewer-header';
    const title = document.createElement('span');
    title.className = 'model-viewer-title';
    title.textContent = `${assetName || assetId} — 3D Model`;
    header.appendChild(title);
    const closeBtn = document.createElement('button');
    closeBtn.className = 'model-viewer-close';
    closeBtn.innerHTML = '\u2715';
    closeBtn.addEventListener('click', () => this.close());
    header.appendChild(closeBtn);
    panel.appendChild(header);

    // Canvas wrapper
    const canvasWrap = document.createElement('div');
    canvasWrap.className = 'model-viewer-canvas-wrap';
    const loading = document.createElement('div');
    loading.className = 'model-viewer-loading';
    loading.textContent = 'Loading model...';
    canvasWrap.appendChild(loading);
    panel.appendChild(canvasWrap);

    // Toolbar
    const toolbar = document.createElement('div');
    toolbar.className = 'model-viewer-toolbar';
    const resetBtn = document.createElement('button');
    resetBtn.textContent = 'Reset Camera';
    resetBtn.addEventListener('click', () => this._resetCamera());
    toolbar.appendChild(resetBtn);
    const wireBtn = document.createElement('button');
    wireBtn.textContent = 'Wireframe';
    wireBtn.addEventListener('click', () => this._toggleWireframe());
    toolbar.appendChild(wireBtn);
    const gridBtn = document.createElement('button');
    gridBtn.textContent = 'Grid';
    gridBtn.addEventListener('click', () => this._toggleGrid());
    toolbar.appendChild(gridBtn);
    const isoBtn = document.createElement('button');
    isoBtn.textContent = 'Isometric (60\u00b0)';
    isoBtn.title = 'Match Blender render camera angle';
    isoBtn.addEventListener('click', () => this._setIsometricCamera());
    toolbar.appendChild(isoBtn);
    const hint = document.createElement('span');
    hint.textContent = 'Drag to orbit \u2022 Scroll to zoom \u2022 Right-drag to pan';
    hint.style.marginLeft = 'auto';
    toolbar.appendChild(hint);
    panel.appendChild(toolbar);

    overlay.appendChild(panel);
    document.body.appendChild(overlay);
    this._overlay = overlay;

    // Close on Escape
    this._escHandler = (e) => { if (e.key === 'Escape') this.close(); };
    document.addEventListener('keydown', this._escHandler);

    // Init Three.js
    this._initScene(canvasWrap, loading, assetId);
  },

  _initScene(container, loadingEl, assetId) {
    const rect = container.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    renderer.setClearColor(0x0a0a14, 1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);
    this._renderer = renderer;

    // Scene
    const scene = new THREE.Scene();
    this._scene = scene;

    // Camera — start at 60° elevation to match Blender template
    const camera = new THREE.PerspectiveCamera(40, w / h, 0.01, 100);
    camera.position.set(2, 1.5, 2);
    this._camera = camera;

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0.5, 0);
    controls.update();
    this._controls = controls;

    // Lighting — 3-point setup matching Blender templates
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xfff0e0, 1.2);
    keyLight.position.set(3, 4, 2);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xe0f0ff, 0.6);
    fillLight.position.set(-2, 2, -1);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x00e5ff, 0.3);
    rimLight.position.set(0, 1, -3);
    scene.add(rimLight);

    // Grid (hidden by default)
    const grid = new THREE.GridHelper(4, 20, 0x1e1e3a, 0x1e1e3a);
    grid.visible = false;
    scene.add(grid);
    this._gridHelper = grid;

    // Load GLB model (cache-bust with timestamp to always fetch latest)
    const loader = new GLTFLoader();
    loader.load(
      `/api/visual-library/${assetId}/model?t=${Date.now()}`,
      (gltf) => {
        loadingEl.remove();
        const model = gltf.scene;

        // Enable vertex colors if present (TripoSR models)
        model.traverse((child) => {
          if (child.isMesh) {
            if (child.geometry.attributes.color) {
              child.material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                metalness: 0.1,
                roughness: 0.7,
              });
            }
            child.castShadow = true;
          }
        });

        // Fix orientation: detect tallest axis and rotate to Y-up
        // Mirrors render_sprites.py normalize_model() logic
        const rawBox = new THREE.Box3().setFromObject(model);
        const rawSize = rawBox.getSize(new THREE.Vector3());
        if (rawSize.z > rawSize.y && rawSize.z > rawSize.x) {
          // Z-up model (Blender convention) → rotate to Y-up (Three.js)
          model.rotation.x = -Math.PI / 2;
        } else if (rawSize.x > rawSize.y && rawSize.x > rawSize.z) {
          // X-up model → rotate to Y-up
          model.rotation.z = Math.PI / 2;
        }

        // Center and scale model to fit view
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        model.position.y -= (box.min.y * scale);

        scene.add(model);

        // Adjust controls target to model center
        const newBox = new THREE.Box3().setFromObject(model);
        const newCenter = newBox.getCenter(new THREE.Vector3());
        controls.target.copy(newCenter);
        controls.update();
      },
      (progress) => {
        if (progress.total > 0) {
          const pct = Math.round((progress.loaded / progress.total) * 100);
          loadingEl.textContent = `Loading model... ${pct}%`;
        }
      },
      (error) => {
        loadingEl.textContent = `Failed to load model: ${error.message || 'Unknown error'}`;
        loadingEl.style.color = '#ff3366';
      }
    );

    // Animation loop
    const animate = () => {
      this._animId = requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    };
    animate();

    // Handle resize
    this._resizeObs = new ResizeObserver(() => {
      const r = container.getBoundingClientRect();
      camera.aspect = r.width / r.height;
      camera.updateProjectionMatrix();
      renderer.setSize(r.width, r.height);
    });
    this._resizeObs.observe(container);
  },

  _resetCamera() {
    if (!this._camera || !this._controls) return;
    this._camera.position.set(2, 1.5, 2);
    this._controls.target.set(0, 0.5, 0);
    this._controls.update();
  },

  _setIsometricCamera() {
    if (!this._camera || !this._controls) return;
    // 60° elevation angle, matching Blender character template
    const dist = 3;
    const elev = (60 * Math.PI) / 180;
    this._camera.position.set(
      dist * Math.cos(elev) * Math.sin(Math.PI / 4),
      dist * Math.sin(elev),
      dist * Math.cos(elev) * Math.cos(Math.PI / 4)
    );
    this._controls.target.set(0, 0.5, 0);
    this._controls.update();
  },

  _toggleWireframe() {
    if (!this._scene) return;
    this._scene.traverse((child) => {
      if (child.isMesh && child.material) {
        child.material.wireframe = !child.material.wireframe;
      }
    });
  },

  _toggleGrid() {
    if (this._gridHelper) this._gridHelper.visible = !this._gridHelper.visible;
  },

  close() {
    if (this._animId) cancelAnimationFrame(this._animId);
    if (this._resizeObs) this._resizeObs.disconnect();
    if (this._renderer) this._renderer.dispose();
    if (this._controls) this._controls.dispose();
    if (this._scene) {
      this._scene.traverse((child) => {
        if (child.isMesh) {
          child.geometry?.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
          }
        }
      });
    }
    if (this._overlay) this._overlay.remove();
    if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
    this._overlay = null;
    this._renderer = null;
    this._scene = null;
    this._camera = null;
    this._controls = null;
    this._animId = null;
    this._gridHelper = null;
  }
};
</script>
