apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: korczewski-tls
  namespace: korczewski-infra
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: korczewski-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .tlscrt }}"
        tls.key: "{{ .tlskey }}"
  data:
    - secretKey: tlscrt
      remoteRef:
        key: tls
        property: tls.crt
    - secretKey: tlskey
      remoteRef:
        key: tls
        property: tls.key
