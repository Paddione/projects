# =============================================================================
# PgBouncer Configuration
# =============================================================================
# Connection pooler sitting between application services and PostgreSQL.
# Uses session mode because all services rely on prepared statements.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: korczewski-infra
data:
  pgbouncer.ini: |
    [databases]
    * = host=postgres.korczewski-infra.svc.cluster.local port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = plain
    auth_file = /etc/pgbouncer/userlist.txt

    ; Session mode required — all services use prepared statements
    pool_mode = session

    ; Connection limits
    max_client_conn = 200
    default_pool_size = 20
    reserve_pool_size = 5
    reserve_pool_timeout = 3

    ; Timeouts
    server_connect_timeout = 5
    server_login_retry = 3
    client_login_timeout = 30
    server_idle_timeout = 300

    ; TLS disabled (intra-cluster traffic)
    server_tls_sslmode = disable

    ; Logging (minimal for production)
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    stats_period = 60

    ; Admin access for SHOW commands
    admin_users = pgbouncer
    stats_users = pgbouncer
