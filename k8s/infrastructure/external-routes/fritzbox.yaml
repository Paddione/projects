---
apiVersion: v1
kind: Service
metadata:
  name: fritzbox-external
  namespace: korczewski-infra
  labels:
    app.kubernetes.io/part-of: korczewski
    tier: infrastructure
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: 443
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: fritzbox-external
  namespace: korczewski-infra
subsets:
  - addresses:
      - ip: 10.0.0.1
    ports:
      - port: 443
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: fritzbox
  namespace: korczewski-infra
  labels:
    app.kubernetes.io/part-of: korczewski
    tier: infrastructure
spec:
  routes:
    - match: Host(`fritz.korczewski.de`)
      kind: Rule
      services:
        - name: fritzbox-external
          port: 443
          scheme: https
      middlewares:
        - name: admin-auth-chain
  tls: {}
