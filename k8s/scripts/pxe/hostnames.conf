# PXE Hostname Map
# Format: one file per IP address under /srv/pxe/http/hostnames/
# Each file contains the hostname as plain text.
#
# Example setup:
#   echo "k3s-cp1" > /srv/pxe/http/hostnames/10.10.0.11
#   echo "k3s-cp2" > /srv/pxe/http/hostnames/10.10.0.12
#   echo "k3s-cp3" > /srv/pxe/http/hostnames/10.10.0.13
#   echo "k3s-w1"  > /srv/pxe/http/hostnames/10.10.0.14
#   echo "k3s-w2"  > /srv/pxe/http/hostnames/10.10.0.15
#   echo "k3s-w3"  > /srv/pxe/http/hostnames/10.10.0.16
#
# Nodes without a mapping will fall back to "k3s-node<last-octet>"
# (e.g., 10.10.0.14 → k3s-node14)
