---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: assetgenerator
  namespace: korczewski-services
  labels:
    app: assetgenerator
    app.kubernetes.io/name: assetgenerator
    app.kubernetes.io/component: assetgenerator
    app.kubernetes.io/part-of: korczewski
    tier: services
spec:
  routes:
    # WebSocket route for GPU worker — needs websocket-chain middleware
    - match: Host(`assetgen.korczewski.de`) && PathPrefix(`/ws/worker`)
      kind: Rule
      middlewares:
        - name: websocket-chain
          namespace: korczewski-infra
      priority: 110
      services:
        - name: assetgenerator
          port: 5200
    # Default route for UI + API
    - match: Host(`assetgen.korczewski.de`)
      kind: Rule
      services:
        - name: assetgenerator
          port: 5200
  tls: {}
