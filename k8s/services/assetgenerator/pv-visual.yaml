---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: assetgenerator-visual-pv
  labels:
    app: assetgenerator
    type: visual-library
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: assetgenerator-visual
    volumeAttributes:
      source: "//10.0.0.11/storage-pve3a/visual-library"
    nodeStageSecretRef:
      name: smbcreds
      namespace: korczewski-infra
  mountOptions:
    - dir_mode=0755
    - file_mode=0644
    - uid=1001
    - gid=1001
    - noperm
    - mfsymlinks
    - cache=none
    - noserverino
