apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: korczewski-jitsi
data:
  turnserver.conf.template: |
    listening-port=3478
    tls-listening-port=5349
    external-ip=__PUBLIC_IP__
    relay-ip=0.0.0.0
    fingerprint
    lt-cred-mech
    use-auth-secret
    static-auth-secret=__TURN_SECRET__
    realm=meet.korczewski.de
    total-quota=100
    bps-capacity=0
    stale-nonce=600
    no-multicast-peers
    no-cli
    log-file=stdout
    verbose
    min-port=49152
    max-port=49401
    cert=/etc/coturn/tls/tls.crt
    pkey=/etc/coturn/tls/tls.key
