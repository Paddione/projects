---
# =============================================================================
# Arena Frontend Deployment
# =============================================================================
# React + PixiJS frontend served by Nginx.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: arena-frontend
  namespace: korczewski-services
  labels:
    app: arena-frontend
    app.kubernetes.io/name: arena-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: korczewski
    tier: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arena-frontend
      app.kubernetes.io/component: frontend
      app.kubernetes.io/part-of: korczewski
      tier: services
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arena-frontend
        app.kubernetes.io/name: arena-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: korczewski
        tier: services
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: arena-frontend
          image: registry.local:5000/korczewski/arena-frontend
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VITE_SOCKET_URL
              value: "wss://arena.korczewski.de"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
