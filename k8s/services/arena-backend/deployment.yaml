---
# =============================================================================
# Arena Backend Deployment
# =============================================================================
# Express.js backend with Socket.io for real-time battle royale game.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: arena-backend
  namespace: korczewski-services
  labels:
    app: arena-backend
    app.kubernetes.io/name: arena-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: korczewski
    tier: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arena-backend
      app.kubernetes.io/component: backend
      app.kubernetes.io/part-of: korczewski
      tier: services
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arena-backend
        app.kubernetes.io/name: arena-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: korczewski
        tier: services
      annotations:
        secret.reloader.stakater.com/reload: "arena-backend-credentials"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: arena-backend
          image: registry.local:5000/korczewski/arena-backend
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3003
              protocol: TCP
          envFrom:
            - secretRef:
                name: arena-backend-credentials
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: AUTH_SERVICE_URL
              value: "http://auth.korczewski-services.svc.cluster.local:5500"
            - name: CORS_ORIGIN
              value: "https://arena.korczewski.de"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
