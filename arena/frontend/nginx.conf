# Optimized nginx configuration for production with security and monitoring

# Worker processes configuration
worker_processes auto;
pid /var/run/nginx.pid;

# Error log configuration
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Logging configuration
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" ';
    
    access_log /var/log/nginx/access.log main;
    
    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # CSP value as a map variable
    map $uri $csp_policy {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' data: ws: wss: https://*.korczewski.de;";
    }
    
    # Hide nginx version
    server_tokens off;
    
    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (inherited by locations without their own add_header)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $csp_policy always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # Runtime env config — never cache
        location = /env-config.js {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy $csp_policy always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # 3D model assets — served from shared visual-library (rigged/ subdirectory)
        # /assets/3d/characters/warrior.glb → /mnt/pve3a/visual-library/rigged/characters/warrior.glb
        location /assets/3d/ {
            alias /mnt/pve3a/visual-library/rigged/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
        }

        # Static assets — long cache
        location /assets/ {
            expires 1y;
            add_header Content-Security-Policy $csp_policy always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            add_header Access-Control-Allow-Origin "*";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy $csp_policy always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }
    }
}
